# basic usage: 2 stops, 3 departures each
type: custom:vienna-transport-card
max_departures: 3
entities:
  - entity: sensor.wl_monitor_4620
    type: subway
  - entity: sensor.wl_monitor_4918
    type: subway


# compact mode: combines same line+direction into one row, showing all countdowns
type: custom:vienna-transport-card
max_departures: 5
compact_mode: true
entities:
  - entity: sensor.wl_monitor_4620
    type: subway


# hide direction text for a narrower card column
type: custom:vienna-transport-card
max_departures: 3
show_direction: false
entities:
  - entity: sensor.wl_monitor_4620
    type: subway


# compact mode + hidden direction for maximum space savings
type: custom:vienna-transport-card
max_departures: 5
compact_mode: true
show_direction: false
entities:
  - entity: sensor.wl_monitor_4620
    type: subway


# filter by direction
type: custom:vienna-transport-card
max_departures: 3
entities:
  - entity: sensor.wl_monitor_1212
    type: bim
    direction: Grinzing


# filter by line
type: custom:vienna-transport-card
max_departures: 3
entities:
  - entity: sensor.wl_monitor_1212
    type: bim
    lines:
      - "38"
      - "41"
